{% extends 'base.html' %}
{% load static %}

{% block content %}
<h1>Menu</h1>
<div class="column">
  {% for item in menu %}
  <p>
    <a href="{% url 'menu_item' pk=item.pk %}">
      {{ item.name }}
    </a>
    <span class="menu-price">
      ${{ item.price }}
    </span>
  </p>
  {% empty %}
    <p>No menu items available yet.</p>
  {% endfor %}
</div>
{% endblock %}
